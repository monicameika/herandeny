<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creador de Posts — @Herass_Tarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;background:#0A0A0A;color:#E8D5B0;display:flex;flex-direction:column;}

/* ── HEADER ── */
header{
  background:#111;border-bottom:1px solid rgba(201,169,110,.12);
  padding:.8rem 1.8rem;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;color:#E8D5B0;letter-spacing:.05em;}
.logo em{font-style:normal;color:#C4622D;}
.logo-sub{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,213,176,.3);margin-top:.1rem;}
.header-badge{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(201,169,110,.4);border:1px solid rgba(201,169,110,.15);padding:.3rem .7rem;border-radius:2px;}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;background:#111;
  border-right:1px solid rgba(255,255,255,.05);
  overflow-y:auto;padding:1.2rem;
  display:flex;flex-direction:column;gap:1.2rem;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(201,169,110,.15);border-radius:2px;}

.s-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,213,176,.35);padding-bottom:.4rem;border-bottom:1px solid rgba(255,255,255,.05);}

/* ── TYPE BUTTONS ── */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.type-btn{
  padding:.6rem .5rem;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:3px;cursor:pointer;
  text-align:left;transition:all .2s;display:flex;align-items:center;gap:.45rem;
}
.type-btn:hover{border-color:rgba(201,169,110,.25);background:rgba(201,169,110,.04);}
.type-btn.active{border-color:rgba(201,169,110,.4);background:rgba(201,169,110,.07);}
.type-btn.active .t-name{color:#C9A96E;}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.t-name{font-size:.7rem;color:rgba(232,213,176,.7);line-height:1.2;}

/* ── FORMAT ── */
.fmt-row{display:flex;gap:.4rem;}
.fmt-btn{
  flex:1;padding:.55rem;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);border-radius:3px;cursor:pointer;
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(232,213,176,.5);transition:all .2s;text-align:center;
  font-family:'Jost',sans-serif;
}
.fmt-btn.active{background:rgba(201,169,110,.07);border-color:rgba(201,169,110,.35);color:#C9A96E;}

.slides-row{display:flex;align-items:center;gap:.7rem;}
.slides-lbl{font-size:.68rem;color:rgba(232,213,176,.45);white-space:nowrap;}
select.ss{
  flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:#E8D5B0;padding:.35rem .5rem;border-radius:3px;
  font-family:'Jost',sans-serif;font-size:.75rem;cursor:pointer;
}
select.ss:focus{outline:none;border-color:rgba(201,169,110,.35);}
select.ss option{background:#1A1A1A;}

/* ── SLIDE BLOCKS ── */
.slide-block{
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);
  border-radius:3px;padding:.9rem;display:flex;flex-direction:column;gap:.55rem;
}
.sb-head{display:flex;justify-content:space-between;align-items:center;}
.sb-num{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(201,169,110,.6);}
.sb-tag{font-size:.55rem;color:rgba(255,255,255,.25);letter-spacing:.06em;}
.fl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,213,176,.3);}
textarea,.ti{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:2px;color:#E8D5B0;font-family:'Jost',sans-serif;font-size:.78rem;
  padding:.5rem .7rem;resize:vertical;transition:border-color .2s;line-height:1.5;
}
textarea:focus,.ti:focus{outline:none;border-color:rgba(201,169,110,.35);}
textarea::placeholder,.ti::placeholder{color:rgba(232,213,176,.18);}
.ti{resize:none;}

/* ── GENERATE BUTTON ── */
.btn-gen{
  background:linear-gradient(135deg,#C4622D,#9A4820);color:white;border:none;
  padding:.8rem;border-radius:3px;font-family:'Jost',sans-serif;
  font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500;
  cursor:pointer;transition:all .2s;width:100%;
}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(196,98,45,.3);}
.btn-gen:active{transform:translateY(0);}

/* ── PREVIEW AREA ── */
.preview{
  flex:1;overflow:auto;background:#0D0D0D;
  display:flex;flex-direction:column;align-items:center;
  padding:2rem;gap:1.5rem;
}
.empty{
  margin:auto;text-align:center;color:rgba(232,213,176,.12);
  display:flex;flex-direction:column;align-items:center;gap:.8rem;
}
.empty-star{font-size:2.5rem;opacity:.4;}
.empty-t{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;font-style:italic;}
.empty-s{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(232,213,176,.08);}

.cards-row{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;}
.cw{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.cn{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(201,169,110,.35);}

/* ── DOWNLOAD BAR ── */
.dl-bar{
  display:flex;gap:.8rem;align-items:center;justify-content:center;
  padding:.9rem 1.5rem;background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);border-radius:3px;
}
.btn-dl{
  background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);
  color:#C9A96E;padding:.6rem 1.2rem;border-radius:3px;
  font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem;
}
.btn-dl:hover{background:rgba(201,169,110,.18);border-color:rgba(201,169,110,.45);}
.btn-dl:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.dl-info{font-size:.62rem;color:rgba(232,213,176,.2);letter-spacing:.06em;}

/* ── CARD BASE ── */
.card{width:380px;height:380px;position:relative;overflow:hidden;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Herandeny <em>Sana</em> · <span style="color:#C9A96E;">Amaneceres</span></div>
    <div class="logo-sub">Creador de posts para Instagram</div>
  </div>
  <div class="header-badge">1080 × 1080 px</div>
</header>

<div class="app">

  <aside class="sidebar">

    <!-- TIPO -->
    <div>
      <div class="s-label" style="margin-bottom:.7rem;">Tipo de comunicación</div>
      <div class="type-grid">
        <button class="type-btn active" onclick="setType('conexion',this)">
          <div class="t-dot" style="background:#C4622D;"></div>
          <div class="t-name">🤝 Conexión</div>
        </button>
        <button class="type-btn" onclick="setType('servicio',this)">
          <div class="t-dot" style="background:#6B4E7D;"></div>
          <div class="t-name">✨ Servicio</div>
        </button>
        <button class="type-btn" onclick="setType('tarot',this)">
          <div class="t-dot" style="background:#4A7C5F;"></div>
          <div class="t-name">📚 Edu Tarot</div>
        </button>
        <button class="type-btn" onclick="setType('astrologia',this)">
          <div class="t-dot" style="background:#3D6478;"></div>
          <div class="t-name">🔭 Astrología</div>
        </button>
        <button class="type-btn" onclick="setType('universal',this)" style="grid-column:1/-1;">
          <div class="t-dot" style="background:#C9A96E;"></div>
          <div class="t-name">⭐ Universal · Inspiración</div>
        </button>
      </div>
    </div>

    <!-- FORMATO -->
    <div>
      <div class="s-label" style="margin-bottom:.7rem;">Formato</div>
      <div class="fmt-row">
        <button class="fmt-btn active" onclick="setFmt('single',this)">1 imagen</button>
        <button class="fmt-btn" onclick="setFmt('carousel',this)">Carrusel</button>
      </div>
      <div id="slidesCntRow" style="display:none;margin-top:.6rem;">
        <div class="slides-row">
          <span class="slides-lbl">Nº de slides:</span>
          <select class="ss" id="slidesCnt" onchange="buildSlides()">
            <option value="3">3 slides</option>
            <option value="4">4 slides</option>
            <option value="5">5 slides</option>
            <option value="6">6 slides</option>
            <option value="7">7 slides</option>
            <option value="8">8 slides</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CONTENIDO -->
    <div>
      <div class="s-label" style="margin-bottom:.7rem;">Contenido</div>
      <div id="slidesContainer"></div>
    </div>

    <button class="btn-gen" onclick="generate()">Generar imagen →</button>

  </aside>

  <main class="preview" id="preview">
    <div class="empty">
      <div class="empty-star">✦</div>
      <div class="empty-t">Tu creatividad aparecerá aquí</div>
      <div class="empty-s">Rellena el formulario y pulsa generar</div>
    </div>
  </main>

</div>

<script>
// ── CONFIG ──
let TYPE = 'conexion';
let FMT  = 'single';

const TYPES = {
  conexion: {
    name:'Conexión', emoji:'🤝',
    bg:'#2D1F14', accent:'#E8856A', raw:'#C4622D',
    glow:'rgba(196,98,45,.3)',
    label:'Terapias Alternativas · Amaneceres',
    cta:'Primera sesión · escríbeme por WhatsApp',
  },
  servicio: {
    name:'Servicio', emoji:'✨',
    bg:'#160D20', accent:'#B08FCC', raw:'#6B4E7D',
    glow:'rgba(107,78,125,.35)',
    label:'Sesión personalizada',
    cta:'Agenda tu sesión · escríbeme por WhatsApp',
  },
  tarot: {
    name:'Tarot Terapéutico', emoji:'📚',
    bg:'#0C1E14', accent:'#7EC4A0', raw:'#4A7C5F',
    glow:'rgba(74,124,95,.3)',
    label:'Tarot Terapéutico · Reflexión',
    cta:'El tarot como espejo · @Herass_Tarot',
  },
  astrologia: {
    name:'Astrología', emoji:'🔭',
    bg:'#09131C', accent:'#7BAFC4', raw:'#3D6478',
    glow:'rgba(61,100,120,.35)',
    label:'Astrología Terapéutica',
    cta:'Tu carta natal como guía · @Herass_Tarot',
  },
  universal: {
    name:'Universal', emoji:'⭐',
    bg:'#2D1F14', accent:'#C9A96E', raw:'#C9A96E',
    glow:'rgba(201,169,110,.2)',
    label:'Terapias Alternativas · Amaneceres',
    cta:'Cada amanecer es una oportunidad',
  },
};

// ── INIT ──
document.addEventListener('DOMContentLoaded', buildSlides);

function setType(t, btn) {
  TYPE = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSlides();
}

function setFmt(f, btn) {
  FMT = f;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('slidesCntRow').style.display = f === 'carousel' ? 'block' : 'none';
  buildSlides();
}

function buildSlides() {
  const c = TYPES[TYPE];
  const box = document.getElementById('slidesContainer');

  if (FMT === 'single') {
    box.innerHTML = `
      <div class="slide-block">
        <div class="sb-head">
          <span class="sb-num">Imagen única</span>
          <span class="sb-tag">${c.emoji} ${c.name}</span>
        </div>
        <div class="fl">Frase principal *</div>
        <textarea id="t0" rows="4" placeholder="Escribe tu frase o idea principal..."></textarea>
        <div class="fl">Contexto / subtexto (opcional)</div>
        <textarea id="ctx0" rows="2" placeholder="Una línea de apoyo o explicación breve..."></textarea>
      </div>`;
  } else {
    const n = parseInt(document.getElementById('slidesCnt').value) || 3;
    let html = `
      <div class="slide-block">
        <div class="sb-head"><span class="sb-num">Slide 1 · Portada</span><span class="sb-tag">Cover</span></div>
        <div class="fl">Frase gancho *</div>
        <textarea id="t0" rows="3" placeholder="La frase que para el scroll..."></textarea>
        <div class="fl">Subtítulo (opcional)</div>
        <input class="ti" type="text" id="sub0" placeholder="Contexto breve...">
      </div>`;

    const nContent = n - 2;
    for (let i = 1; i <= nContent; i++) {
      html += `
        <div class="slide-block">
          <div class="sb-head"><span class="sb-num">Slide ${i+1} · Punto</span><span class="sb-tag">${String(i).padStart(2,'0')}</span></div>
          <div class="fl">Título del punto *</div>
          <input class="ti" type="text" id="t${i}" placeholder="Punto clave...">
          <div class="fl">Explicación</div>
          <textarea id="ctx${i}" rows="3" placeholder="Desarrolla la idea en 2-3 líneas..."></textarea>
        </div>`;
    }

    html += `
      <div class="slide-block">
        <div class="sb-head"><span class="sb-num">Slide ${n} · Cierre</span><span class="sb-tag">CTA</span></div>
        <div class="fl">Llamada a la acción *</div>
        <textarea id="tcta" rows="3">${c.cta}</textarea>
      </div>`;

    box.innerHTML = html;
  }
}

// ── CARD TEMPLATES ──
const STAR = `<svg width="30" height="30" viewBox="0 0 80 80" fill="none"><line x1="40" y1="0" x2="40" y2="80" stroke="white" stroke-width=".8" opacity=".4"/><line x1="0" y1="40" x2="80" y2="40" stroke="white" stroke-width=".8" opacity=".4"/><line x1="11.7" y1="11.7" x2="68.3" y2="68.3" stroke="white" stroke-width=".8" opacity=".4"/><line x1="68.3" y1="11.7" x2="11.7" y2="68.3" stroke="white" stroke-width=".8" opacity=".4"/></svg>`;

function s(prop, val) { return `${prop}:${val};`; }
function base(bg) {
  return `position:relative;overflow:hidden;font-family:'Jost',sans-serif;background:${bg};`;
}

function cardSingle(c, text, ctx) {
  const q = text || '"Tu frase irá aquí"';
  return `
<div class="card" style="${base(c.bg)}display:flex;flex-direction:column;justify-content:center;padding:2.2rem;">
  <div style="position:absolute;top:-4rem;right:-4rem;width:16rem;height:16rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-4rem;left:-4rem;width:11rem;height:11rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);opacity:.4;pointer-events:none;"></div>
  <div style="position:absolute;top:1.2rem;left:50%;transform:translateX(-50%);opacity:.25;">${STAR}</div>
  <div style="position:relative;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:${c.accent};margin-bottom:1rem;">${c.label}</div>
  <p style="position:relative;font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;font-style:italic;color:white;line-height:1.45;">${q}</p>
  <div style="position:relative;width:2rem;height:1px;background:${c.accent};opacity:.45;margin:1rem 0;"></div>
  ${ctx ? `<p style="position:relative;font-size:.78rem;color:rgba(255,255,255,.42);line-height:1.65;">${ctx}</p>` : ''}
  <div style="position:absolute;bottom:.9rem;right:1rem;font-size:.55rem;letter-spacing:.06em;color:rgba(255,255,255,.18);">@Herass_Tarot</div>
</div>`;
}

function cardCover(c, text, sub) {
  return `
<div class="card" style="${base(c.bg)}display:flex;flex-direction:column;justify-content:flex-end;padding:2rem;">
  <div style="position:absolute;top:-3rem;right:-3rem;width:18rem;height:18rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;top:1.4rem;left:1.4rem;opacity:.22;">${STAR}</div>
  <div style="position:relative;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:${c.accent};margin-bottom:.7rem;">${c.name}</div>
  <h2 style="position:relative;font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:white;line-height:1.15;margin-bottom:.8rem;">${text || 'Tu titular aquí'}${sub ? `<br><em style="font-style:italic;color:${c.accent};font-size:1.6rem;">${sub}</em>` : ''}</h2>
  <div style="position:relative;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.28);">Desliza para ver más  →</div>
  <div style="position:absolute;bottom:.9rem;right:1rem;font-size:.55rem;letter-spacing:.06em;color:rgba(255,255,255,.18);">@Herass_Tarot</div>
</div>`;
}

function cardContent(c, num, title, desc, progress, total) {
  const n = String(num).padStart(2,'0');
  const pct = Math.round((progress / total) * 100);
  return `
<div class="card" style="${base(c.bg)}display:flex;flex-direction:column;justify-content:center;padding:2.2rem;">
  <div style="position:absolute;top:-4rem;right:-4rem;width:12rem;height:12rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-.5rem;right:.4rem;font-family:'Cormorant Garamond',serif;font-size:7rem;font-weight:600;color:${c.accent};opacity:.06;line-height:1;pointer-events:none;">${n}</div>
  <div style="position:relative;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:${c.accent};margin-bottom:.5rem;">${n}</div>
  <h3 style="position:relative;font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;color:white;line-height:1.2;margin-bottom:.7rem;">${title || 'Título del punto'}</h3>
  <div style="position:relative;width:2rem;height:1px;background:${c.accent};opacity:.4;margin-bottom:.8rem;"></div>
  ${desc ? `<p style="position:relative;font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.7;">${desc}</p>` : ''}
  <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.05);">
    <div style="width:${pct}%;height:100%;background:${c.accent};opacity:.4;"></div>
  </div>
  <div style="position:absolute;bottom:.9rem;right:1rem;font-size:.55rem;letter-spacing:.06em;color:rgba(255,255,255,.18);">@Herass_Tarot</div>
</div>`;
}

function cardCTA(c, ctaText) {
  return `
<div class="card" style="${base(c.bg)}display:flex;flex-direction:column;justify-content:space-between;padding:2rem;">
  <div style="position:absolute;top:-3rem;right:-3rem;width:16rem;height:16rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-4rem;left:-4rem;width:11rem;height:11rem;border-radius:50%;background:radial-gradient(circle,${c.glow} 0%,transparent 70%);pointer-events:none;"></div>
  <div style="position:relative;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:${c.accent};">${c.name}</div>
  <div style="position:relative;">
    <p style="font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;font-style:italic;color:white;line-height:1.4;margin-bottom:1.2rem;">${ctaText || c.cta}</p>
    <div style="display:inline-block;background:${c.raw}28;border:1px solid ${c.accent}35;color:${c.accent};padding:.4rem .9rem;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;border-radius:2px;">Escríbeme por WhatsApp</div>
  </div>
  <div style="position:relative;display:flex;justify-content:space-between;align-items:flex-end;">
    <span style="font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.22);">Herandeny Sana · Amaneceres</span>
    <span style="font-size:.55rem;letter-spacing:.06em;color:rgba(255,255,255,.18);">@Herass_Tarot</span>
  </div>
</div>`;
}

// ── GENERATE ──
function generate() {
  const c = TYPES[TYPE];
  let inner = '';

  if (FMT === 'single') {
    const t   = (document.getElementById('t0')?.value || '').trim();
    const ctx = (document.getElementById('ctx0')?.value || '').trim();
    inner = `<div class="cw"><div class="cn">Imagen única · 1080 × 1080 px</div>${cardSingle(c, t, ctx)}</div>`;
  } else {
    const n        = parseInt(document.getElementById('slidesCnt').value) || 3;
    const coverT   = (document.getElementById('t0')?.value || '').trim();
    const coverSub = (document.getElementById('sub0')?.value || '').trim();
    const ctaT     = (document.getElementById('tcta')?.value || '').trim();
    const nContent = n - 2;

    inner += `<div class="cw"><div class="cn">01 · Portada</div>${cardCover(c, coverT, coverSub)}</div>`;

    for (let i = 1; i <= nContent; i++) {
      const t   = (document.getElementById(`t${i}`)?.value || '').trim();
      const ctx = (document.getElementById(`ctx${i}`)?.value || '').trim();
      inner += `<div class="cw"><div class="cn">0${i+1} · Contenido</div>${cardContent(c, i, t, ctx, i+1, n)}</div>`;
    }

    inner += `<div class="cw"><div class="cn">0${n} · CTA</div>${cardCTA(c, ctaT)}</div>`;
  }

  document.getElementById('preview').innerHTML = `
    <div class="cards-row" id="cardsRow">${inner}</div>
    <div class="dl-bar">
      <button class="btn-dl" id="dlBtn" onclick="downloadAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar PNG${FMT==='carousel'?'s':''}
      </button>
      <span class="dl-info">1080 × 1080 px · PNG transparente</span>
    </div>`;
}

// ── DOWNLOAD ──
async function downloadAll() {
  await document.fonts.ready;
  const cards = document.querySelectorAll('#cardsRow .card');
  const btn   = document.getElementById('dlBtn');
  btn.textContent = 'Generando…';
  btn.disabled    = true;

  const scale = 1080 / 380;

  for (let i = 0; i < cards.length; i++) {
    try {
      const canvas = await html2canvas(cards[i], {
        scale,
        useCORS: true,
        allowTaint: false,
        backgroundColor: null,
        width: 380,
        height: 380,
        logging: false,
      });
      const a  = document.createElement('a');
      a.href   = canvas.toDataURL('image/png');
      a.download = cards.length === 1
        ? `herandeny-${TYPE}.png`
        : `herandeny-${TYPE}-${String(i+1).padStart(2,'0')}.png`;
      a.click();
      if (i < cards.length - 1) await new Promise(r => setTimeout(r, 700));
    } catch(e) {
      console.error('Error al capturar card', i, e);
    }
  }

  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar PNG${FMT==='carousel'?'s':''}`;
  btn.disabled = false;
}
</script>
</body>
